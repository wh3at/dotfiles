[tools]
bun = "1.3.6"
chezmoi = "latest"
dotnet = "10.0.201"
fzf = "latest"
gh = "latest"
node = "24"
"npm:@aku11i/phantom" = "latest"
"npm:@openai/codex" = "latest"
"npm:@shopify/cli" = "latest"
"npm:agent-browser" = "latest"
"npm:eas-cli" = "latest"
"npm:repomix" = "latest"
"npm:takt" = "latest"
"npm:vercel" = "latest"
opencode = "latest"
php = "8.5"
pnpm = "10.28"
python = "latest"
stripe = "1.42.1"
zellij = "latest"
zig = "0.14.0"
zoxide = "latest"

[tasks.pf]
description = "SSH port-forward in background (ask interactively)"
run = "~/.config/mise/scripts/pf-start.sh"

[tasks."pf:list"]
description = "List active SSH port-forwards"
run = "~/.config/mise/scripts/pf-list.sh"

[tasks."pf:stop"]
description = "Stop SSH port-forward interactively"
run = "~/.config/mise/scripts/pf-stop.sh"

[tasks.site2skill]
description = "Convert website to Codex skill interactively"
run = "~/.config/mise/scripts/site2skill.sh"

[tasks."jj:workspace:new"]
# Runs project-root jj-workspace-setup.sh in the new workspace when present.
description = "Create workspace, open zellij tab, and run project-root jj-workspace-setup.sh when present"
run = "~/.config/mise/scripts/jj-workspace-new.sh"

[tasks."jj:workspace:clean"]
description = "Delete merged workspace safely, remove directory, and close zellij tab"
run = "~/.config/mise/scripts/jj-workspace-clean.sh"

[tasks."chezmoi:managed"]
description = "chezmoiで管理されているファイルをファジー検索"
run = "chezmoi managed | fzf"

[tasks.format]
description = "Run custom formatting script interactively"
run = "~/.config/mise/scripts/format.sh"

[tasks."fcitx5:restart"]
description = "Restart fcitx5 demon"
run = "fcitx5 -r -d"

[tasks."zellij:clients"]
description = "現在のzellijセッションに接続しているプロセスを特定できる。1つ目はセッション本体。"
run = "ps -ef | grep \"zellij.*$ZELLIJ_SESSION_NAME\" | grep -v grep"

[tasks."hypr:bring-windows"]
description = "画面外のウィンドウを表示領域内に戻す"
run = "~/.config/mise/scripts/hypr-bring-windows.sh"

[tasks."hypr:fetch-window"]
description = "他のワークスペースのウィンドウを選択して現在のワークスペースに移動"
run = "~/.config/mise/scripts/hypr-fetch-window.sh"

[tasks."deer-flow:start"]
description = "Start DeerFlow dev containers and expose them on Tailscale"
run = "~/.config/mise/scripts/deer-flow-start.sh"

[tasks."deer-flow:stop"]
description = "Stop DeerFlow dev containers and remove the Tailscale serve rule"
run = "~/.config/mise/scripts/deer-flow-stop.sh"

[tasks."deer-flow:status"]
description = "Show DeerFlow container, local health, and Tailscale serve status"
run = "~/.config/mise/scripts/deer-flow-status.sh"

[tasks."port:lookup"]
description = "プロセス名からPIDとリスニングポートを検索"
run = "~/.config/mise/scripts/port-lookup.sh"

[tasks."port:check"]
description = "ポート番号からリスニング状況を確認"
run = "~/.config/mise/scripts/port-check.sh"

[tasks."voxtype:restart"]
description = "GPU有効化＋voxtypeデーモン再起動"
run = "sudo voxtype setup gpu --enable && systemctl --user restart voxtype"
